# Single-service deployment. IMPORTANT: keep exactly ONE replica — there is one
# in-memory TLSocketRoom per room globally, so multiple replicas would diverge.
services:
  canvas:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Optional: bake the tldraw license key into the client bundle at build time.
        VITE_TLDRAW_LICENSE_KEY: ${VITE_TLDRAW_LICENSE_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /data
      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Cloudflare R2 (omit to fall back to local-disk asset storage)
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
    volumes:
      - canvas-data:/data

volumes:
  canvas-data:
